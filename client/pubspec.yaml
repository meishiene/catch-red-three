name: catch_red_three
description: 抓红3 - Chinese card game
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  socket_io_client: ^2.0.3
  provider: ^6.1.1
  flutter_riverpod: ^2.4.9
  go_router: ^13.0.0
  audioplayers: ^5.2.1
  vibration: ^1.8.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/cards/
    - assets/audio/
